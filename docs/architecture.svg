<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="pi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6fb3"/>
      <stop offset="1" stop-color="#244e85"/>
    </linearGradient>
    <linearGradient id="mod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#7a8aa0"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="660" fill="#f7f9fc"/>
  <text x="490" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2d3d">Atmospheric Turbulence Chamber — System Architecture</text>
  <text x="490" y="56" text-anchor="middle" font-size="13" fill="#6b7a90">5 modules × 1 m = 5 m optical path · FSO / VLC / OCC · IDeTIC / ULPGC</text>

  <!-- Raspberry Pi 5 -->
  <rect x="300" y="78" width="380" height="104" rx="12" fill="url(#pi)"/>
  <text x="490" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Raspberry Pi 5  +  7" touchscreen</text>
  <text x="490" y="126" text-anchor="middle" font-size="12" fill="#d6e3f4">Mosquitto broker · asyncio orchestrator</text>
  <text x="490" y="144" text-anchor="middle" font-size="12" fill="#d6e3f4">touch UI · HDF5 / CSV logging</text>
  <text x="490" y="162" text-anchor="middle" font-size="12" fill="#d6e3f4">online Cn² from D_T(r)</text>

  <!-- WiFi / MQTT bus -->
  <line x1="490" y1="182" x2="490" y2="214" stroke="#7a8aa0" stroke-width="2"/>
  <text x="506" y="202" font-size="12" fill="#6b7a90" font-style="italic">WiFi · MQTT (chamber/m{N}/…)</text>
  <line x1="110" y1="214" x2="870" y2="214" stroke="#7a8aa0" stroke-width="2"/>

  <!-- Modules -->
  <g>
    <!-- module template repeated 5× via individual groups -->
    <!-- positions: x = 30, 214, 398, 582, 766 ; width 184 -->
    <g>
      <line x1="122" y1="214" x2="122" y2="252" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g>
      <line x1="306" y1="214" x2="306" y2="252" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g>
      <line x1="490" y1="214" x2="490" y2="252" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g>
      <line x1="674" y1="214" x2="674" y2="252" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
    <g>
      <line x1="858" y1="214" x2="858" y2="252" stroke="#7a8aa0" stroke-width="2" marker-end="url(#arrow)"/>
    </g>
  </g>

  <!-- Module cards -->
  <g font-size="11" fill="#33445c">
    <!-- Module 1 -->
    <g transform="translate(30,254)">
      <rect width="184" height="320" rx="10" fill="url(#mod)" stroke="#c4d0de"/>
      <rect width="184" height="30" rx="10" fill="#244e85"/>
      <text x="92" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Module 1</text>
      <rect x="14" y="44" width="156" height="34" rx="6" fill="#dbe6f5" stroke="#9db8df"/>
      <text x="92" y="65" text-anchor="middle" font-weight="600">ESP32 (PID + state machine)</text>
      <rect x="14" y="86" width="156" height="40" rx="6" fill="#ffe3d6" stroke="#e6a07c"/>
      <text x="92" y="103" text-anchor="middle">NiChrome heater</text>
      <text x="92" y="118" text-anchor="middle" fill="#8a5a3c">24 V · MOSFET PWM</text>
      <rect x="14" y="134" width="156" height="34" rx="6" fill="#d8f0e2" stroke="#86c6a3"/>
      <text x="92" y="151" text-anchor="middle">2× 120 mm fans</text>
      <text x="92" y="164" text-anchor="middle" fill="#3e7a5a">12 V · purge</text>
      <rect x="14" y="176" width="156" height="50" rx="6" fill="#eee2f5" stroke="#b594cf"/>
      <text x="92" y="193" text-anchor="middle">1× DS18B20 ctrl</text>
      <text x="92" y="208" text-anchor="middle">5× DS18B20 array</text>
      <text x="92" y="221" text-anchor="middle" fill="#6a4b86">Cn² characterization</text>
      <rect x="14" y="234" width="156" height="32" rx="6" fill="#fdeaea" stroke="#e3a2a2"/>
      <text x="92" y="247" text-anchor="middle" font-weight="600" fill="#a23b3b">85 °C thermal fuse</text>
      <text x="92" y="260" text-anchor="middle" fill="#a23b3b">+ 10 A input fuse</text>
      <text x="92" y="288" text-anchor="middle" fill="#6b7a90">UHP-200-24 + TXN 35-112</text>
      <text x="92" y="304" text-anchor="middle" fill="#6b7a90">50 × 50 cm PMMA · 1 m</text>
    </g>

