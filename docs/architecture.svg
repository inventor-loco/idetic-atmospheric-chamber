      <rect width="184" height="30" rx="10" fill="#244e85"/>
      <text x="92" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Module 2</text>
      <rect x="14" y="44" width="156" height="34" rx="6" fill="#dbe6f5" stroke="#9db8df"/>
      <text x="92" y="65" text-anchor="middle" font-weight="600">ESP32 (PID + state machine)</text>
      <rect x="14" y="86" width="156" height="40" rx="6" fill="#ffe3d6" stroke="#e6a07c"/>
      <text x="92" y="110" text-anchor="middle">NiChrome heater · 24 V PWM</text>
      <rect x="14" y="134" width="156" height="34" rx="6" fill="#d8f0e2" stroke="#86c6a3"/>
      <text x="92" y="155" text-anchor="middle">2× fans · 12 V</text>
      <rect x="14" y="176" width="156" height="50" rx="6" fill="#eee2f5" stroke="#b594cf"/>
      <text x="92" y="200" text-anchor="middle">1 ctrl + 5 array DS18B20</text>
      <rect x="14" y="234" width="156" height="32" rx="6" fill="#fdeaea" stroke="#e3a2a2"/>
      <text x="92" y="254" text-anchor="middle" font-weight="600" fill="#a23b3b">thermal + input fuses</text>
      <text x="92" y="296" text-anchor="middle" fill="#6b7a90">UHP-200-24 + TXN 35-112</text>
    </g>

    <g transform="translate(398,254)">
      <rect width="184" height="320" rx="10" fill="url(#mod)" stroke="#c4d0de"/>
      <rect width="184" height="30" rx="10" fill="#244e85"/>
      <text x="92" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Module 3</text>
      <rect x="14" y="44" width="156" height="34" rx="6" fill="#dbe6f5" stroke="#9db8df"/>
      <text x="92" y="65" text-anchor="middle" font-weight="600">ESP32 (PID + state machine)</text>
      <rect x="14" y="86" width="156" height="40" rx="6" fill="#ffe3d6" stroke="#e6a07c"/>
      <text x="92" y="110" text-anchor="middle">NiChrome heater · 24 V PWM</text>
      <rect x="14" y="134" width="156" height="34" rx="6" fill="#d8f0e2" stroke="#86c6a3"/>
      <text x="92" y="155" text-anchor="middle">2× fans · 12 V</text>
      <rect x="14" y="176" width="156" height="50" rx="6" fill="#eee2f5" stroke="#b594cf"/>
      <text x="92" y="200" text-anchor="middle">1 ctrl + 5 array DS18B20</text>
      <rect x="14" y="234" width="156" height="32" rx="6" fill="#fdeaea" stroke="#e3a2a2"/>
      <text x="92" y="254" text-anchor="middle" font-weight="600" fill="#a23b3b">thermal + input fuses</text>
      <text x="92" y="296" text-anchor="middle" fill="#6b7a90">UHP-200-24 + TXN 35-112</text>
    </g>

    <g transform="translate(582,254)">
      <rect width="184" height="320" rx="10" fill="url(#mod)" stroke="#c4d0de"/>
      <rect width="184" height="30" rx="10" fill="#244e85"/>
      <text x="92" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Module 4</text>
      <rect x="14" y="44" width="156" height="34" rx="6" fill="#dbe6f5" stroke="#9db8df"/>
      <text x="92" y="65" text-anchor="middle" font-weight="600">ESP32 (PID + state machine)</text>
      <rect x="14" y="86" width="156" height="40" rx="6" fill="#ffe3d6" stroke="#e6a07c"/>
      <text x="92" y="110" text-anchor="middle">NiChrome heater · 24 V PWM</text>
      <rect x="14" y="134" width="156" height="34" rx="6" fill="#d8f0e2" stroke="#86c6a3"/>
      <text x="92" y="155" text-anchor="middle">2× fans · 12 V</text>
      <rect x="14" y="176" width="156" height="50" rx="6" fill="#eee2f5" stroke="#b594cf"/>
      <text x="92" y="200" text-anchor="middle">1 ctrl + 5 array DS18B20</text>
      <rect x="14" y="234" width="156" height="32" rx="6" fill="#fdeaea" stroke="#e3a2a2"/>
      <text x="92" y="254" text-anchor="middle" font-weight="600" fill="#a23b3b">thermal + input fuses</text>
      <text x="92" y="296" text-anchor="middle" fill="#6b7a90">UHP-200-24 + TXN 35-112</text>
    </g>

    <g transform="translate(766,254)">
      <rect width="184" height="320" rx="10" fill="url(#mod)" stroke="#c4d0de"/>
      <rect width="184" height="30" rx="10" fill="#244e85"/>
      <text x="92" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Module 5</text>
      <rect x="14" y="44" width="156" height="34" rx="6" fill="#dbe6f5" stroke="#9db8df"/>
      <text x="92" y="65" text-anchor="middle" font-weight="600">ESP32 (PID + state machine)</text>
      <rect x="14" y="86" width="156" height="40" rx="6" fill="#ffe3d6" stroke="#e6a07c"/>
      <text x="92" y="110" text-anchor="middle">NiChrome heater · 24 V PWM</text>
      <rect x="14" y="134" width="156" height="34" rx="6" fill="#d8f0e2" stroke="#86c6a3"/>
      <text x="92" y="155" text-anchor="middle">2× fans · 12 V</text>
      <rect x="14" y="176" width="156" height="50" rx="6" fill="#eee2f5" stroke="#b594cf"/>
      <text x="92" y="200" text-anchor="middle">1 ctrl + 5 array DS18B20</text>
      <rect x="14" y="234" width="156" height="32" rx="6" fill="#fdeaea" stroke="#e3a2a2"/>
      <text x="92" y="254" text-anchor="middle" font-weight="600" fill="#a23b3b">thermal + input fuses</text>
      <text x="92" y="296" text-anchor="middle" fill="#6b7a90">UHP-200-24 + TXN 35-112</text>
    </g>
  </g>

  <!-- optical path arrow -->
  <line x1="40" y1="600" x2="940" y2="600" stroke="#c0392b" stroke-width="2" stroke-dasharray="2 4" marker-end="url(#arrow)"/>
  <text x="490" y="592" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="600">optical beam — 5 m free-space path through all modules</text>
</svg>
