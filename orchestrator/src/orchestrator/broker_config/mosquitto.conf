# Mosquitto config for the chamber Pi 5 (PROJECT_SEED §6).
# Install:  sudo apt install mosquitto mosquitto-clients
# Deploy:   sudo cp mosquitto.conf /etc/mosquitto/conf.d/chamber.conf && sudo systemctl restart mosquitto
#
# Lab-LAN configuration. Lock this down (TLS + per-module ACLs) before exposing
# the broker beyond the isolated chamber network.

listener 1883
# Phase 0/1: anonymous on the isolated lab LAN. Tighten in Phase 2.
allow_anonymous true

# Persistence so retained status/setpoint survive a broker restart.
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type warning
log_type error
log_type notice

