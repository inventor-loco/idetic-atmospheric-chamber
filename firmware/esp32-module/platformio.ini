; PlatformIO project for the atmospheric-chamber ESP32 module firmware.
;
; Two board environments are defined because we have both 38-pin and 30-pin
; ESP32 dev boards in stock (PROJECT_SEED §11). The firmware is identical;
; only the pin map in include/board_config.h differs, selected via build flags.

[platformio]
default_envs = esp32dev_38p

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Shared library dependencies (PROJECT_SEED §5).
lib_deps =
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4

; Common build flags. Wi-Fi / MQTT credentials are injected here so they stay
; out of source control. Copy secrets.ini.example -> secrets.ini and fill in.
build_flags =
    -DCHAMBER_FW_VERSION=\"0.1.0\"
    ${secrets.build_flags}

extra_configs =
    secrets.ini

[env:esp32dev_38p]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_DEV_38P

[env:esp32dev_30p]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_DEV_30P
